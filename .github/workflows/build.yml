name: 打包机械图纸PDF编辑器
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: 配置Python 3.10环境
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: 安装项目依赖和打包工具
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 执行打包生成EXE
      run: pyinstaller -F -w -n 机械图纸PDF编辑器 --hidden-import fitz --hidden-import PyQt6.QtGui --hidden-import PyQt6.QtCore --hidden-import PyQt6.QtWidgets --hidden-import openpyxl --collect-all PyQt6 main.py

    - name: 上传打包成品
      uses: actions/upload-artifact@v4
      with:
        name: 机械图纸PDF编辑器
        path: dist/机械图纸PDF编辑器.exe
